<!DOCTYPE html>
<html>

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Weather API</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>

    <body>
        <div class="container">
            <h1 class="mb-5 display-1 fw-bold">Weather API</h1>
            <div class="search-box d-flex justify-content-center align-items-center">
                <input type="text" id="cityInput" placeholder="Enter City name">
                <button onclick="getWeather()" class="btn1 text-center"><svg xmlns="http://www.w3.org/2000/svg"
                        width="20" height="20" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                    </svg></button>
            </div>
            <p class="error" id="error"></p>
            <div class="weather" id="weather">
                <div class="temp" id="temp">
                    --°C
                </div>
                <div class="city" id="city">
                    City
                </div>
                <div class="desc" id="condition">
                    Weather Condition
                </div>
                <div class="details ">
                    <div class="box">
                        <h3 class="fs-2">Wind</h3>
                        <p class="fs-5" id="wind">0 km/h</p>
                    </div>
                    <div class="box">
                        <h3 class="fs-2">Humidity</h3>
                        <p class="fs-5" id="humidity">0%</p>
                    </div>
                </div>
            </div>
        </div>
        <script src="./js/script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </body>

</html>
